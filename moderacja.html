<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderacja opinii · Unicorner</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#07060f; --ink2:#0b0918; --surface:#100d22;
    --line:#241d4a; --line2:#3a2e74;
    --text:#eef0ff; --muted:#9b93c4; --muted2:#6f679a;
    --accent:#a78bfa; --cyan:#27e8ff; --gold:#ffd84a;
    --ok:#5ad1a0; --ok-bg:#0c241d; --bad:#f87a8e; --bad-bg:#2a0f17;
    --mono:'Chakra Petch',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--ink);color:var(--text);min-height:100vh;line-height:1.55;padding:30px 20px;}
  .wrap{max-width:640px;margin:0 auto;}
  h1{font-family:var(--mono);font-size:1.3rem;margin-bottom:4px;}
  h1::before{content:"// ";color:var(--cyan);}
  .sub{color:var(--muted2);font-size:.85rem;margin-bottom:22px;}
  .row{display:flex;gap:8px;margin-bottom:22px;}
  input{flex:1;font-family:var(--mono);font-size:.95rem;color:var(--text);background:var(--ink2);border:1px solid var(--line2);border-radius:4px;padding:11px 13px;outline:none;}
  input:focus{border-color:var(--accent);}
  button{font-family:var(--mono);font-weight:600;font-size:.88rem;border:none;border-radius:4px;padding:11px 16px;cursor:pointer;transition:opacity .15s;}
  button:hover{opacity:.85;}
  .load{background:var(--accent);color:#07060f;}
  .chip{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:16px;margin-bottom:12px;}
  .chip .stars{color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
  .chip .txt{font-size:.94rem;margin-bottom:8px;white-space:pre-wrap;}
  .chip .meta{font-family:var(--mono);font-size:.74rem;color:var(--muted2);margin-bottom:12px;}
  .chip .acts{display:flex;gap:8px;}
  .ok{background:var(--ok-bg);color:var(--ok);border:1px solid #1d4a3a;}
  .no{background:var(--bad-bg);color:var(--bad);border:1px solid #5a2230;}
  .msg{font-family:var(--mono);font-size:.85rem;color:var(--muted);margin:14px 0;}
  .msg.err{color:var(--bad);}
</style>
</head>
<body>
<div class="wrap">
  <h1>moderacja opinii</h1>
  <p class="sub">Strona robocza — nie jest nigdzie podlinkowana. Zatwierdzone opinie od razu pojawiają się na stronie głównej.</p>
  <div class="row">
    <input type="password" id="code" placeholder="kod administratora" autocomplete="off">
    <button class="load" id="load">Wczytaj</button>
  </div>
  <div class="msg" id="msg"></div>
  <div id="list"></div>
</div>
<script>
const WORKER_URL = "https://red-queen-3002.unicorner.workers.dev";
const $ = id => document.getElementById(id);
$('code').value = sessionStorage.getItem('uc_admin') || "";
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

async function load(){
  const code = $('code').value.trim();
  if(!code){ msg("Wpisz kod.", true); return; }
  sessionStorage.setItem('uc_admin', code);
  msg("Wczytuję…");
  try{
    const res = await fetch(WORKER_URL + "/admin/list?code=" + encodeURIComponent(code));
    if(res.status===401){ msg("Zły kod.", true); return; }
    const list = await res.json();
    render(list);
    msg(list.length ? list.length + " oczekujących" : "Brak oczekujących opinii ✦");
  }catch{ msg("Brak połączenia z workerem.", true); }
}
function render(list){
  $('list').innerHTML = list.map(r=>`
    <div class="chip" id="c-${r.id}">
      <div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
      <div class="txt">${esc(r.text)}</div>
      <div class="meta">— ${esc(r.name||'Anonim')}${r.subject?' · '+esc(r.subject):''} · ${new Date(r.ts).toLocaleString('pl-PL')}</div>
      <div class="acts">
        <button class="ok" onclick="decide('${r.id}','approve')">✓ Zatwierdź</button>
        <button class="no" onclick="decide('${r.id}','reject')">✕ Odrzuć</button>
      </div>
    </div>`).join('');
}
async function decide(id, action){
  try{
    const res = await fetch(WORKER_URL + "/admin/decide", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ code: $('code').value.trim(), id, action })
    });
    if(!res.ok){ const d=await res.json().catch(()=>({})); msg(d.error||"Błąd.", true); return; }
    const el = $('c-'+id); if(el) el.remove();
    msg(action==='approve' ? "Zatwierdzona — jest na stronie." : "Odrzucona.");
  }catch{ msg("Brak połączenia.", true); }
}
function msg(t, err){ const m=$('msg'); m.textContent=t; m.className="msg"+(err?" err":""); }
$('load').addEventListener('click', load);
$('code').addEventListener('keydown', e=>{ if(e.key==='Enter') load(); });
</script>
</body>
</html>
